<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Continue</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:#fff;
padding:40px;
width:90%;
max-width:420px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
text-align:center;
}

h1{
font-size:30px;
margin-bottom:15px;
}

p{
color:#666;
line-height:1.6;
margin-bottom:30px;
}

.btn{
display:block;
background:#2563eb;
color:white;
padding:16px;
border-radius:10px;
text-decoration:none;
font-size:18px;
font-weight:bold;
transition:.2s;
}

.btn:hover{
opacity:.9;
}
</style>

</head>

<body>

<div class="card">

<h1>Continue</h1>

<p>
Click below to continue.
</p>

<a class="btn" href="https://kslgn.bemobtrcks.com/click">
Continue
</a>

</div>

</body>
</html>
